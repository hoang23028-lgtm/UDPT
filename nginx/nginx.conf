# Load balancer for 3 Spring Boot replicas (docker-compose services app1, app2, app3:8080).
# Mount: ./nginx/nginx.conf -> /etc/nginx/nginx.conf

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'upstream=$upstream_addr upstream_status=$upstream_status '
                    'request_time=$request_time';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;

    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 256;

    # --- Upstream: 3 app nodes -----------------------------------------------
    # Balancing: least_conn (fewest active connections). For plain round-robin,
    # remove the "least_conn;" line (default weighted RR in order listed).
    upstream quiz_api {
        least_conn;

        server app1:8080 max_fails=3 fail_timeout=30s weight=1;
        server app2:8080 max_fails=3 fail_timeout=30s weight=1;
        server app3:8080 max_fails=3 fail_timeout=30s weight=1;

        keepalive 64;
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 10m;
        client_body_timeout 60s;
        send_timeout 120s;

        # --- API: proxy to Spring Boot -------------------------------------
        location / {
            proxy_pass http://quiz_api;
            proxy_http_version 1.1;

            # Standard reverse-proxy headers (Spring ForwardedHeaderFilter compatible)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Forwarded-Port $server_port;

            # Reuse connections to upstreams (must clear Connection for HTTP/1.1 keepalive)
            proxy_set_header Connection "";

            # Timeouts (client ↔ nginx ↔ upstream)
            proxy_connect_timeout 10s;
            proxy_send_timeout 120s;
            proxy_read_timeout 120s;

            # Failover: retry another upstream on these conditions (GET/HEAD safe; idempotent APIs)
            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 3;
            proxy_next_upstream_timeout 30s;

            proxy_buffering on;
            proxy_redirect off;
        }

        # --- Health: load balancer itself (no upstream; use for Docker HEALTHCHECK) ---
        location = /nginx-health {
            access_log off;
            default_type text/plain;
            return 200 "nginx ok\n";
        }

        # --- Health: alias for operators / probes --------------------------------
        location = /health {
            access_log off;
            default_type text/plain;
            return 200 "nginx ok\n";
        }
    }
}
