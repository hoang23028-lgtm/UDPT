spring.application.name=quiz-app

# CockroachDB cluster (Docker Compose service names). PostgreSQL JDBC driver.
spring.datasource.url=jdbc:postgresql://crdb-1:26257,crdb-2:26257,crdb-3:26257/quizdb?sslmode=disable
spring.datasource.username=root
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=10

spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
spring.data.redis.repositories.enabled=false

app.kafka.enabled=true
spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.consumer.group-id=quiz-submitted-workers
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.listener.auto-startup=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.CockroachDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

server.port=8080

# Stateless API (JWT); no server-side HTTP session
spring.session.store-type=none
server.servlet.session.persistent=false

# Override in production: docker run -e APP_JWT_SECRET=<256-bit+ secret>
app.jwt.secret=${APP_JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
app.jwt.expiration-ms=86400000

logging.level.org.hibernate.SQL=warn
logging.level.org.springframework.security=warn
