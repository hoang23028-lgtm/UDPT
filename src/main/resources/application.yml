spring:
  application:
    name: quiz-app
  datasource:
    # Multi-node JDBC (failover / load-aware routing via PostgreSQL driver).
    # Local single node: override with SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:26257/quizdb?sslmode=disable
    url: jdbc:postgresql://crdb-1:26257,crdb-2:26257,crdb-3:26257/quizdb?sslmode=disable
    username: root
    password:
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      validation-timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Leaderboard cache (Redis). Local: docker run -d -p 6379:6379 redis:7-alpine
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.CockroachDialect
        jdbc:
          time_zone: UTC
        jakarta.persistence.query.timeout: 30000
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: quiz-submitted-workers
      auto-offset-reset: earliest
    listener:
      auto-startup: false

server:
  port: 8080

# HS256 requires >= 256 bits (32 bytes). Override in production (env / secret manager).
app:
  kafka:
    enabled: false
  jwt:
    secret: "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
    expiration-ms: 86400000

logging:
  level:
    org.hibernate.SQL: warn
