spring:
  application:
    name: quiz-app
  datasource:
    # Multi-node JDBC (failover / load-aware routing via PostgreSQL driver).
    # Local single node: override with SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:26257/quizdb?sslmode=disable
    url: jdbc:postgresql://crdb-1:26257,crdb-2:26257,crdb-3:26257/quizdb?sslmode=disable
    username: root
    password:
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      validation-timeout: 5000
  flyway:
    enabled: true
    locations: classpath:db/migration
  # Leaderboard cache (Redis). Local: docker run -d -p 6379:6379 redis:7-alpine
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms
      repositories:
        enabled: false
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.CockroachDialect
        jdbc:
          time_zone: UTC
        jakarta.persistence.query.timeout: 30000
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: quiz-submitted-workers
      auto-offset-reset: earliest
    listener:
      auto-startup: false

server:
  port: 8080

app:
  kafka:
    enabled: false
  jwt:
    # MUST override via env/secret manager in real deployments.
    secret: ${APP_JWT_SECRET:}
    expiration-ms: 86400000
  rate-limit:
    enabled: true
    login:
      window-seconds: 60
      max-requests: 20
    submit:
      window-seconds: 30
      max-requests: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      application: ${spring.application.name}

logging:
  level:
    org.hibernate.SQL: warn
