# =============================================================================
# Distributed Quiz stack: 3× Spring Boot, 3× CockroachDB, 1× Nginx (bridge: quiz-net)
#
# --- CockroachDB: equivalent `cockroach start` per node (same --join on ALL) ---
#
# Node 1 (crdb-1):
#   cockroach start --insecure \
#     --advertise-addr=crdb-1:26257 \
#     --http-addr=crdb-1:8080 \
#     --join=crdb-1,crdb-2,crdb-3
#
# Node 2 (crdb-2):
#   cockroach start --insecure \
#     --advertise-addr=crdb-2:26257 \
#     --http-addr=crdb-2:8080 \
#     --join=crdb-1,crdb-2,crdb-3
#
# Node 3 (crdb-3):
#   cockroach start --insecure \
#     --advertise-addr=crdb-3:26257 \
#     --http-addr=crdb-3:8080 \
#     --join=crdb-1,crdb-2,crdb-3
#
# Cluster auto-initializes when a quorum is up (modern CockroachDB; no `init` step).
#
# --- One-time logical database (also executed by `quizdb-init` below) ---
#   cockroach sql --insecure --host=crdb-1:26257 -e "CREATE DATABASE IF NOT EXISTS quizdb;"
#
# Prerequisites: `mvn -DskipTests package` so target/quiz-app.jar exists for the image build.
# Compose: Docker Compose v2.20+ (uses service_completed_successfully).
# =============================================================================

name: quiz-dist

services:
  crdb-1:
    image: cockroachdb/cockroach:v23.2.5
    hostname: crdb-1
    command: >
      start --insecure
      --advertise-addr=crdb-1:26257
      --http-addr=crdb-1:8080
      --join=crdb-1,crdb-2,crdb-3
    volumes:
      - crdb1-data:/cockroach/cockroach-data
    networks:
      - quiz-net
    ports:
      - "8081:8080"
      - "26257:26257"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cockroach sql --insecure --host=127.0.0.1:26257 -e 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  crdb-2:
    image: cockroachdb/cockroach:v23.2.5
    hostname: crdb-2
    command: >
      start --insecure
      --advertise-addr=crdb-2:26257
      --http-addr=crdb-2:8080
      --join=crdb-1,crdb-2,crdb-3
    volumes:
      - crdb2-data:/cockroach/cockroach-data
    networks:
      - quiz-net
    ports:
      - "8082:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cockroach sql --insecure --host=127.0.0.1:26257 -e 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  crdb-3:
    image: cockroachdb/cockroach:v23.2.5
    hostname: crdb-3
    command: >
      start --insecure
      --advertise-addr=crdb-3:26257
      --http-addr=crdb-3:8080
      --join=crdb-1,crdb-2,crdb-3
    volumes:
      - crdb3-data:/cockroach/cockroach-data
    networks:
      - quiz-net
    ports:
      - "8083:8080"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "cockroach sql --insecure --host=127.0.0.1:26257 -e 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 45s

  quizdb-init:
    image: cockroachdb/cockroach:v23.2.5
    networks:
      - quiz-net
    depends_on:
      crdb-1:
        condition: service_healthy
      crdb-2:
        condition: service_healthy
      crdb-3:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >-
      cockroach sql --insecure --host=crdb-1:26257
      -e "CREATE DATABASE IF NOT EXISTS quizdb;"
    restart: "no"

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.18
    hostname: kafka
    networks:
      - quiz-net
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --overprovisioned
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7-alpine
    hostname: redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - quiz-net
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  app1: &spring-app
    build:
      context: .
      dockerfile: Dockerfile
    hostname: app1
    environment:
      SPRING_PROFILES_ACTIVE: docker
      # Run Flyway migrations from a single node to avoid distributed-lock contention.
      SPRING_FLYWAY_ENABLED: "true"
    networks:
      - quiz-net
    depends_on:
      crdb-1:
        condition: service_healthy
      crdb-2:
        condition: service_healthy
      crdb-3:
        condition: service_healthy
      quizdb-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: unless-stopped

  app2:
    <<: *spring-app
    hostname: app2
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_FLYWAY_ENABLED: "false"

  app3:
    <<: *spring-app
    hostname: app3
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_FLYWAY_ENABLED: "false"

  nginx:
    image: nginx:1.25-alpine
    hostname: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - quiz-net
    depends_on:
      app1:
        condition: service_started
      app2:
        condition: service_started
      app3:
        condition: service_started
    restart: unless-stopped

networks:
  quiz-net:
    driver: bridge

volumes:
  crdb1-data:
  crdb2-data:
  crdb3-data:
